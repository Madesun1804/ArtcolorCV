<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — Artcolor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFC300; --black: #0a0a0a; --dark2: #111; --dark3: #1a1a1a;
      --border: rgba(255,255,255,0.08); --white: #fff; --gray: #888;
    }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }

    /* ── Header placeholder ── */
    #site-header { position: sticky; top: 0; z-index: 800; }

    /* ── Page ── */
    .page-wrap {
      max-width: 1200px; margin: 0 auto; padding: 48px 24px 80px;
    }
    .page-title {
      font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -.5px;
    }
    .page-breadcrumb {
      font-size: 13px; color: var(--gray); margin-bottom: 40px;
    }
    .page-breadcrumb a { color: var(--yellow); text-decoration: none; }
    .page-breadcrumb a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      align-items: start;
    }

    /* ── Cart items ── */
    .cart-section {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .cart-section-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-section-header h2 {
      font-size: 15px; font-weight: 700; letter-spacing: -.2px;
    }
    .cart-section-header span {
      font-size: 13px; color: var(--gray);
    }
    .btn-limpar {
      background: none; border: none; color: #ef4444; font-size: 12px;
      font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: background .15s; font-family: inherit;
    }
    .btn-limpar:hover { background: rgba(239,68,68,.1); }

    /* Empty state */
    .cart-empty {
      padding: 64px 24px;
      text-align: center; color: var(--gray);
    }
    .cart-empty svg { opacity: .2; margin-bottom: 16px; }
    .cart-empty p { font-size: 15px; margin-bottom: 6px; color: #fff; }
    .cart-empty small { font-size: 13px; }
    .cart-empty a {
      display: inline-block; margin-top: 24px;
      padding: 12px 28px; background: var(--yellow); color: var(--black);
      border-radius: 10px; font-weight: 700; font-size: 14px; text-decoration: none;
    }

    /* Item row */
    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .item-img {
      width: 80px; height: 80px; border-radius: 10px;
      background: var(--dark3); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-info { min-width: 0; }
    .item-category {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--yellow); margin-bottom: 4px;
    }
    .item-name {
      font-size: 14px; font-weight: 600; color: var(--white);
      text-decoration: none; display: block; margin-bottom: 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-name:hover { color: var(--yellow); }
    .item-controls {
      display: flex; align-items: center; gap: 8px;
    }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--dark3); border: 1px solid rgba(255,255,255,.12);
      color: var(--white); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s; line-height: 1;
    }
    .qty-btn:hover { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
    .qty-val {
      font-size: 14px; font-weight: 700; min-width: 24px; text-align: center;
    }
    .item-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    }
    .item-price {
      font-size: 17px; font-weight: 900; color: var(--yellow); white-space: nowrap;
    }
    .btn-remove {
      background: none; border: none; color: var(--gray); cursor: pointer;
      padding: 4px; border-radius: 6px; transition: color .15s, background .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-remove:hover { color: #ef4444; background: rgba(239,68,68,.1); }

    /* ── Summary ── */
    .cart-summary {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: sticky; top: 100px;
    }
    .summary-title {
      font-size: 15px; font-weight: 700; margin-bottom: 20px; letter-spacing: -.2px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; margin-bottom: 12px; color: var(--gray);
    }
    .summary-row span:last-child { color: var(--white); font-weight: 600; }
    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .summary-total {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; font-weight: 700; margin-bottom: 24px;
    }
    .summary-total span:last-child { font-size: 22px; font-weight: 900; color: var(--yellow); }
    .summary-pix {
      background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.2);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 8px;
    }
    .summary-pix svg { flex-shrink: 0; }
    .btn-checkout {
      width: 100%; padding: 15px; background: var(--yellow); color: var(--black);
      border: none; border-radius: 12px; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: background .2s; font-family: inherit;
      letter-spacing: .3px;
    }
    .btn-checkout:hover { background: #e6b000; }
    .btn-checkout:disabled { opacity: .4; cursor: not-allowed; }
    .btn-continuar {
      width: 100%; padding: 13px; background: transparent; color: var(--white);
      border: 1px solid var(--border); border-radius: 12px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: border-color .2s; font-family: inherit;
      margin-top: 10px; text-decoration: none; display: block; text-align: center;
    }
    .btn-continuar:hover { border-color: rgba(255,255,255,.25); }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
    @media (max-width: 480px) {
      .cart-item { grid-template-columns: 64px 1fr; }
      .item-right { display: none; }
      .item-controls { justify-content: space-between; }
      .item-price-mobile {
        font-size: 15px; font-weight: 900; color: var(--yellow); margin-top: 6px;
      }
      .page-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="site-header"></div>

<div class="page-wrap">
  <h1 class="page-title">Meu Carrinho</h1>
  <p class="page-breadcrumb">
    <a href="index.html">Início</a> &rsaquo;
    <a href="produtos.html">Produtos</a> &rsaquo;
    Carrinho
  </p>

  <div class="cart-layout">

    <!-- Itens -->
    <div class="cart-section">
      <div class="cart-section-header">
        <h2>Itens no carrinho <span id="qty-label"></span></h2>
        <button class="btn-limpar" onclick="limparCarrinho()">Limpar tudo</button>
      </div>
      <div id="cart-body">
        <!-- renderizado via JS -->
      </div>
    </div>

    <!-- Resumo -->
    <div class="cart-summary">
      <div class="summary-title">Resumo do Pedido</div>

      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">R$ 0,00</span>
      </div>
      <div class="summary-row">
        <span>Frete</span>
        <span id="frete">Calcular</span>
      </div>

      <hr class="summary-divider">

      <div class="summary-total">
        <span>Total</span>
        <span id="total">R$ 0,00</span>
      </div>

      <div class="summary-pix">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Ganhe 5% de desconto pagando via PIX
      </div>

      <button class="btn-checkout" id="btn-checkout" onclick="finalizarPedido()">
        Finalizar Pedido
      </button>
      <a href="produtos.html" class="btn-continuar">Continuar comprando</a>
    </div>

  </div>
</div>

<script src="header.js"></script>
<script>
const CART_KEY = 'artcolor_cart';

function fmt(v) {
  return parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function _normalize(i) {
  return {
    id:        i.id,
    nome:      i.nome  || i.name  || '',
    preco:     parseFloat(i.preco || i.price || 0),
    imagem:    i.imagem || i.img  || '',
    slug:      i.slug  || '',
    quantidade: parseInt(i.quantidade || i.qty || 1)
  };
}

function salvarCarrinho(items) {
  localStorage.setItem(CART_KEY, JSON.stringify(items));
  if (typeof window.updateCartBadge === 'function') window.updateCartBadge();
}

function renderCarrinho() {
  const raw = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
  const items = raw.map(_normalize);
  const body = document.getElementById('cart-body');
  const qtyLabel = document.getElementById('qty-label');
  const subtotalEl = document.getElementById('subtotal');
  const freteEl = document.getElementById('frete');
  const totalEl = document.getElementById('total');
  const btnCheckout = document.getElementById('btn-checkout');

  const totalQty = items.reduce((s, i) => s + i.quantidade, 0);
  if (qtyLabel) qtyLabel.textContent = totalQty ? `(${totalQty})` : '';

  if (!items.length) {
    body.innerHTML = `
      <div class="cart-empty">
        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <p>Seu carrinho está vazio</p>
        <small>Adicione produtos para continuar</small>
        <a href="produtos.html">Ver produtos</a>
      </div>`;
    if (btnCheckout) btnCheckout.disabled = true;
    return;
  }

  if (btnCheckout) btnCheckout.disabled = false;

  body.innerHTML = items.map((item, idx) => `
    <div class="cart-item">
      <div class="item-img">
        ${item.imagem
          ? `<img src="${item.imagem}" alt="${item.nome}">`
          : `<svg width="32" height="32" fill="none" stroke="#555" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`}
      </div>
      <div class="item-info">
        <a href="produto.html?slug=${item.slug}" class="item-name">${item.nome}</a>
        <div class="item-controls">
          <button class="qty-btn" onclick="alterarQty(${idx}, -1)">−</button>
          <span class="qty-val">${item.quantidade}</span>
          <button class="qty-btn" onclick="alterarQty(${idx}, 1)">+</button>
          <span class="item-price-mobile">${fmt(item.preco * item.quantidade)}</span>
        </div>
      </div>
      <div class="item-right">
        <span class="item-price">${fmt(item.preco * item.quantidade)}</span>
        <button class="btn-remove" onclick="removerItem(${idx})" title="Remover">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');

  const subtotal = items.reduce((s, i) => s + i.preco * i.quantidade, 0);
  const frete = subtotal >= 500 ? 0 : null;

  if (subtotalEl) subtotalEl.textContent = fmt(subtotal);
  if (freteEl) freteEl.textContent = frete === 0 ? 'Grátis' : 'Calcular no checkout';
  if (totalEl) totalEl.textContent = frete === 0 ? fmt(subtotal) : fmt(subtotal);
}

function alterarQty(idx, delta) {
  const items = JSON.parse(localStorage.getItem(CART_KEY) || '[]').map(_normalize);
  items[idx].quantidade = Math.max(1, items[idx].quantidade + delta);
  salvarCarrinho(items);
  renderCarrinho();
}

function removerItem(idx) {
  const items = JSON.parse(localStorage.getItem(CART_KEY) || '[]').map(_normalize);
  items.splice(idx, 1);
  salvarCarrinho(items);
  renderCarrinho();
}

function limparCarrinho() {
  if (!confirm('Deseja remover todos os itens do carrinho?')) return;
  salvarCarrinho([]);
  renderCarrinho();
}

function finalizarPedido() {
  const token = localStorage.getItem('artcolor_token');
  if (!token) {
    sessionStorage.setItem('redirect_apos_login', 'checkout.html');
    window.location.href = 'login.html';
    return;
  }
  window.location.href = 'checkout.html';
}

renderCarrinho();
</script>
</body>
</html>
