<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Artcolor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Lado esquerdo — decorativo */
    .side-brand {
      flex: 1;
      background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      border-right: 1px solid #222;
    }
    .side-brand .logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 16px; }
    .side-brand .logo span { color: #FFC300; }
    .side-brand p { color: #888; font-size: 1rem; text-align: center; line-height: 1.6; max-width: 300px; }
    .side-brand .badge {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .badge-item { display: flex; align-items: center; gap: 12px; color: #ccc; font-size: .9rem; }
    .badge-icon { width: 36px; height: 36px; background: #FFC300; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* Lado direito — formulário */
    .side-form {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 48px;
      background: #0a0a0a;
    }

    .back-link { color: #888; font-size: .875rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 40px; transition: color .2s; }
    .back-link:hover { color: #FFC300; }

    .form-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
    .form-subtitle { color: #888; font-size: .9rem; margin-bottom: 32px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid #222; }
    .tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      color: #666; font-weight: 500; font-size: .9rem;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all .2s;
    }
    .tab.active { color: #FFC300; border-bottom-color: #FFC300; }

    /* Painel de abas */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Campos */
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: #aaa; margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }
    .field input {
      width: 100%; padding: 14px 16px;
      background: #111; border: 1px solid #2a2a2a; border-radius: 10px;
      color: #fff; font-size: .95rem; font-family: inherit;
      transition: border-color .2s;
      outline: none;
    }
    .field input:focus { border-color: #FFC300; }
    .field input::placeholder { color: #444; }

    .btn {
      width: 100%; padding: 15px;
      background: #FFC300; color: #000; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 8px;
    }
    .btn:hover { background: #e6b000; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .divider { text-align: center; color: #444; font-size: .8rem; margin: 20px 0; }

    .alert {
      padding: 12px 16px; border-radius: 8px; font-size: .875rem;
      margin-bottom: 20px; display: none;
    }
    .alert.erro { background: #2a0a0a; border: 1px solid #5a1a1a; color: #ff6b6b; display: block; }
    .alert.sucesso { background: #0a2a0a; border: 1px solid #1a5a1a; color: #6bff6b; display: block; }

    @media (max-width: 768px) {
      .side-brand { display: none; }
      .side-form { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div class="page">
  <!-- Lado esquerdo -->
  <div class="side-brand">
    <div class="logo">Art<span>color</span></div>
    <p>Sua loja de comunicação visual com qualidade premium e entrega rápida.</p>
    <div class="badge">
      <div class="badge-item">
        <div class="badge-icon">
          <svg width="18" height="18" fill="none" stroke="#000" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        Compra 100% segura
      </div>
      <div class="badge-item">
        <div class="badge-icon">
          <svg width="18" height="18" fill="none" stroke="#000" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="2"/></svg>
        </div>
        Pagamento facilitado
      </div>
      <div class="badge-item">
        <div class="badge-icon">
          <svg width="18" height="18" fill="none" stroke="#000" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        Suporte via WhatsApp
      </div>
    </div>
  </div>

  <!-- Formulário -->
  <div class="side-form">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar ao site
    </a>

    <div class="form-title">Bem-vindo</div>
    <div class="form-subtitle">Acesse sua conta ou crie uma nova</div>

    <div class="tabs">
      <div class="tab active" onclick="trocarAba('login')">Entrar</div>
      <div class="tab" onclick="trocarAba('cadastro')">Criar conta</div>
    </div>

    <!-- Alerta global -->
    <div class="alert" id="alerta"></div>

    <!-- Aba Login -->
    <div class="tab-panel active" id="painel-login">
      <form id="form-login" onsubmit="fazerLogin(event)">
        <div class="field">
          <label>E-mail ou usuário</label>
          <input type="text" id="login-email" placeholder="seu@email.com ou usuário" required>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn" id="btn-login">Entrar na minha conta</button>
      </form>
    </div>

    <!-- Aba Cadastro -->
    <div class="tab-panel" id="painel-cadastro">
      <form id="form-cadastro" onsubmit="fazerCadastro(event)">
        <div class="field">
          <label>Nome completo</label>
          <input type="text" id="cad-nome" placeholder="Seu nome" required>
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" required>
        </div>
        <div class="field">
          <label>Telefone / WhatsApp</label>
          <input type="tel" id="cad-telefone" placeholder="(XX) XXXXX-XXXX">
        </div>
        <div class="field">
          <label>Senha (mín. 6 caracteres)</label>
          <input type="password" id="cad-senha" placeholder="Crie uma senha" required minlength="6">
        </div>
        <button type="submit" class="btn" id="btn-cadastro">Criar minha conta</button>
      </form>
    </div>
  </div>
</div>

<script>
  const API = window.API_URL + '/api';

  function trocarAba(aba) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (aba === 'login')));
    document.getElementById('painel-login').classList.toggle('active', aba === 'login');
    document.getElementById('painel-cadastro').classList.toggle('active', aba === 'cadastro');
    esconderAlerta();
  }

  function mostrarAlerta(msg, tipo = 'erro') {
    const el = document.getElementById('alerta');
    el.textContent = msg;
    el.className = `alert ${tipo}`;
  }
  function esconderAlerta() {
    document.getElementById('alerta').className = 'alert';
  }

  function salvarSessao(token, usuario) {
    localStorage.setItem('artcolor_token', token);
    localStorage.setItem('artcolor_usuario', JSON.stringify(usuario));
  }

  function redirecionarAposLogin(tipo) {
    const destino = sessionStorage.getItem('redirect_apos_login');
    if (destino) { sessionStorage.removeItem('redirect_apos_login'); window.location.href = destino; return; }
    window.location.href = tipo === 'admin' ? 'admin/index.html' : 'painel/index.html';
  }

  async function fazerLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Entrando...';
    esconderAlerta();

    try {
      const r = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          senha: document.getElementById('login-senha').value
        })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.erro);
      salvarSessao(data.token, data.usuario);
      mostrarAlerta('Login realizado! Redirecionando...', 'sucesso');
      setTimeout(() => redirecionarAposLogin(data.usuario.tipo), 800);
    } catch (err) {
      mostrarAlerta(err.message || 'Erro ao fazer login.');
      btn.disabled = false; btn.textContent = 'Entrar na minha conta';
    }
  }

  async function fazerCadastro(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-cadastro');
    btn.disabled = true; btn.textContent = 'Criando conta...';
    esconderAlerta();

    try {
      const r = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nome: document.getElementById('cad-nome').value,
          email: document.getElementById('cad-email').value,
          telefone: document.getElementById('cad-telefone').value,
          senha: document.getElementById('cad-senha').value
        })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.erro);
      salvarSessao(data.token, data.usuario);
      mostrarAlerta('Conta criada! Redirecionando...', 'sucesso');
      setTimeout(() => redirecionarAposLogin(data.usuario.tipo), 800);
    } catch (err) {
      mostrarAlerta(err.message || 'Erro ao criar conta.');
      btn.disabled = false; btn.textContent = 'Criar minha conta';
    }
  }

  // Se já está logado, redirecionar
  if (localStorage.getItem('artcolor_token')) {
    const u = JSON.parse(localStorage.getItem('artcolor_usuario') || '{}');
    window.location.href = u.tipo === 'admin' ? 'admin/index.html' : 'painel/index.html';
  }
</script>
</body>
</html>
