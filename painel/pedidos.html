<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pedidos — Artcolor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="painel.css">
</head>
<body>

<div class="painel-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Art<span>color</span></div>
    <div class="sidebar-secao">Menu</div>
    <a href="index.html" class="nav-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="pedidos.html" class="nav-item active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      Meus Pedidos
    </a>
    <a href="perfil.html" class="nav-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Meu Perfil
    </a>
    <a href="../produtos.html" class="nav-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Loja
    </a>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="avatar-inicial">?</div>
        <div>
          <div class="user-nome" id="user-nome">Carregando...</div>
          <div class="user-tipo">Cliente</div>
        </div>
      </div>
      <button class="btn-sair" onclick="sair()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="btn-menu" id="btn-menu" aria-label="Menu">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-header-text">
        <h1>Meus Pedidos</h1>
        <p>Acompanhe o status de todos os seus pedidos.</p>
      </div>
    </div>

    <div class="tabela-card">
      <div class="tabela-header">
        <div class="tabela-titulo">Histórico de Pedidos</div>
      </div>
      <div id="lista-pedidos">
        <div class="empty">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          <p>Carregando pedidos...</p>
        </div>
      </div>
    </div>

    <!-- Modal de detalhe -->
    <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:#000a;z-index:1000;align-items:center;justify-content:center">
      <div style="background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:32px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <h2 style="font-size:1.1rem;font-weight:700" id="modal-numero">Pedido</h2>
          <button onclick="fecharModal()" style="background:none;border:none;color:#666;cursor:pointer;font-size:1.2rem">✕</button>
        </div>
        <div id="modal-conteudo"></div>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:4000/api';

  function statusBadge(s) {
    const map = {
      aguardando_pagamento: ['badge-aguardando', 'Aguardando Pagamento'],
      pago:       ['badge-pago',      'Pago'],
      em_producao:['badge-producao',  'Em Produção'],
      enviado:    ['badge-enviado',   'Enviado'],
      entregue:   ['badge-entregue',  'Entregue'],
      cancelado:  ['badge-cancelado', 'Cancelado']
    };
    const [cls, label] = map[s] || ['badge-aguardando', s];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function fmt(v) { return parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
  function fmtData(d) { return new Date(d).toLocaleDateString('pt-BR'); }

  async function carregar() {
    const token = localStorage.getItem('artcolor_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const usuario = JSON.parse(localStorage.getItem('artcolor_usuario') || '{}');
    document.getElementById('user-nome').textContent = usuario.nome || '';
    document.getElementById('avatar-inicial').textContent = (usuario.nome || '?')[0].toUpperCase();

    try {
      const r = await fetch(`${API}/pedidos/meus`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.status === 401) { sair(); return; }
      const pedidos = await r.json();
      const container = document.getElementById('lista-pedidos');

      if (!pedidos.length) {
        container.innerHTML = `<div class="empty">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          <p>Você ainda não fez nenhum pedido. <a href="../produtos.html" style="color:#FFC300">Ver produtos</a></p>
        </div>`;
        return;
      }

      container.innerHTML = `
        <table>
          <thead><tr>
            <th>Número</th><th>Data</th><th>Pagamento</th><th>Total</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${pedidos.map(p => `
              <tr>
                <td style="font-weight:700;color:#fff">${p.numero}</td>
                <td>${fmtData(p.criado_em)}</td>
                <td style="text-transform:capitalize">${p.metodo_pagamento || '—'}</td>
                <td style="color:#FFC300;font-weight:700">${fmt(p.total)}</td>
                <td>${statusBadge(p.status)}</td>
                <td>
                  <button class="btn-sm btn-secondary" onclick="verDetalhe('${p.numero}')">Detalhes</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch (e) { console.error(e); }
  }

  async function verDetalhe(numero) {
    const token = localStorage.getItem('artcolor_token');
    try {
      const r = await fetch(`${API}/pedidos/${numero}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const p = await r.json();

      document.getElementById('modal-numero').textContent = `Pedido ${p.numero}`;
      const end = p.endereco_entrega || {};
      document.getElementById('modal-conteudo').innerHTML = `
        <div style="margin-bottom:16px">${statusBadge(p.status)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          <div><div style="font-size:.7rem;color:#666;text-transform:uppercase;margin-bottom:4px">Data</div><div>${new Date(p.criado_em).toLocaleString('pt-BR')}</div></div>
          <div><div style="font-size:.7rem;color:#666;text-transform:uppercase;margin-bottom:4px">Pagamento</div><div style="text-transform:capitalize">${p.metodo_pagamento || '—'}</div></div>
        </div>
        <div style="font-size:.75rem;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:10px">Itens do Pedido</div>
        ${(p.itens || []).map(i => `
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e1e1e;font-size:.875rem">
            <span>${i.nome_produto} × ${i.quantidade}</span>
            <span style="color:#FFC300;font-weight:600">${parseFloat(i.subtotal).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
          </div>`).join('')}
        <div style="margin-top:16px">
          <div style="display:flex;justify-content:space-between;font-size:.875rem;color:#888;margin-bottom:6px"><span>Subtotal</span><span>${parseFloat(p.subtotal).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:.875rem;color:#888;margin-bottom:6px"><span>Frete</span><span>${p.frete == 0 ? 'Grátis' : parseFloat(p.frete).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:1rem;font-weight:700;margin-top:10px;padding-top:10px;border-top:1px solid #1e1e1e"><span>Total</span><span style="color:#FFC300">${parseFloat(p.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>
        </div>
        ${end.logradouro ? `
        <div style="margin-top:20px;font-size:.75rem;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:8px">Endereço de Entrega</div>
        <div style="font-size:.875rem;color:#aaa;line-height:1.6">${end.logradouro}, ${end.numero}${end.complemento ? ', ' + end.complemento : ''}<br>${end.bairro || ''} — ${end.cidade}/${end.estado}<br>CEP: ${end.cep}</div>` : ''}`;

      document.getElementById('modal-overlay').style.display = 'flex';
    } catch (e) { console.error(e); }
  }

  function fecharModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  function sair() {
    localStorage.removeItem('artcolor_token');
    localStorage.removeItem('artcolor_usuario');
    window.location.href = '../login.html';
  }

  carregar();

  // Mobile sidebar toggle
  (function(){
    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);
    const sidebar = document.querySelector('.sidebar');
    const btnMenu = document.getElementById('btn-menu');
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    if (btnMenu) btnMenu.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
  })();
</script>
</body>
</html>
