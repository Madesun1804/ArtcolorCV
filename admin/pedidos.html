<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="../config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — Admin Artcolor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="painel-layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <div class="logo-mark">A</div>
        <span class="logo-text">Artcolor</span>
      </div>
      <span class="sidebar-tag">Painel Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-secao">Principal</div>
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="pedidos.html" class="nav-item active">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Pedidos
      </a>
      <a href="produtos.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Produtos
      </a>
      <a href="usuarios.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Usuários
      </a>
      <div class="nav-secao">Atalhos</div>
      <a href="../index.html" class="nav-item" target="_blank">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Ver Site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="avatar">A</div>
        <div>
          <div class="user-nome" id="user-nome">Admin</div>
          <div class="user-tipo">Administrador</div>
        </div>
      </div>
      <button class="btn-sair" onclick="sair()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair da conta
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <button class="btn-menu" id="btn-menu" aria-label="Menu">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <div class="page-title">Pedidos</div>
        <div class="page-desc">Gerencie e atualize o status de todos os pedidos.</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="filtros" id="filtros">
          <button class="filtro-btn active" onclick="filtrar('', this)">Todos</button>
          <button class="filtro-btn" onclick="filtrar('aguardando_pagamento', this)">Aguardando</button>
          <button class="filtro-btn" onclick="filtrar('pago', this)">Pagos</button>
          <button class="filtro-btn" onclick="filtrar('em_producao', this)">Em Produção</button>
          <button class="filtro-btn" onclick="filtrar('enviado', this)">Enviados</button>
          <button class="filtro-btn" onclick="filtrar('entregue', this)">Entregues</button>
          <button class="filtro-btn" onclick="filtrar('cancelado', this)">Cancelados</button>
        </div>
      </div>
      <div id="corpo-tabela">
        <div class="empty"><div class="empty-icon"><svg width="26" height="26" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div><p>Carregando...</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal de detalhe / edição de status -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo">Pedido</span>
      <button class="modal-fechar" onclick="fecharModal()">✕</button>
    </div>
    <div id="modal-corpo"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'window.API_URL/api';
let token, statusFiltro = '';

const STATUS_LABELS = {
  aguardando_pagamento:'Aguardando Pagamento', pago:'Pago',
  em_producao:'Em Produção', enviado:'Enviado',
  entregue:'Entregue', cancelado:'Cancelado'
};

function badge(s) {
  const m = {aguardando_pagamento:'badge-aguardando',pago:'badge-pago',em_producao:'badge-producao',enviado:'badge-enviado',entregue:'badge-entregue',cancelado:'badge-cancelado'};
  return `<span class="badge ${m[s]||'badge-aguardando'}">${STATUS_LABELS[s]||s}</span>`;
}
function fmt(v){return parseFloat(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtD(d){return new Date(d).toLocaleString('pt-BR');}
function toast(msg,tipo=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${tipo} show`;setTimeout(()=>t.classList.remove('show'),2800);}

function filtrar(status, btn) {
  statusFiltro = status;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  carregar();
}

async function carregar() {
  const el = document.getElementById('corpo-tabela');
  const qs = statusFiltro ? `?status=${statusFiltro}` : '';
  try {
    const r = await fetch(`${API}/admin/pedidos${qs}`, {headers:{'Authorization':`Bearer ${token}`}});
    if(r.status===401||r.status===403){sair();return;}
    const {pedidos} = await r.json();

    if (!pedidos.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon"><svg width="26" height="26" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg></div><p>Nenhum pedido encontrado.</p></div>';
      return;
    }

    el.innerHTML = `<table>
      <thead><tr>
        <th>Número</th><th>Cliente</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Data</th><th>Ações</th>
      </tr></thead>
      <tbody>${pedidos.map(p=>`<tr>
        <td><strong>${p.numero}</strong></td>
        <td>
          <div style="font-weight:500">${p.cliente_nome||'—'}</div>
          <div style="font-size:.78rem;color:var(--text-2)">${p.cliente_email||''}</div>
        </td>
        <td style="font-weight:600">${fmt(p.total)}</td>
        <td style="text-transform:capitalize;color:var(--text-2)">${p.metodo_pagamento||'—'}</td>
        <td>${badge(p.status)}</td>
        <td style="color:var(--text-2);font-size:.8rem">${new Date(p.criado_em).toLocaleDateString('pt-BR')}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="abrirModal(${p.id},'${p.numero}','${p.status}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Status
          </button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch(e){console.error(e);}
}

function abrirModal(id, numero, statusAtual) {
  document.getElementById('modal-titulo').textContent = `Pedido ${numero}`;
  document.getElementById('modal-corpo').innerHTML = `
    <div style="margin-bottom:20px">
      <p style="color:var(--text-2);font-size:.875rem;margin-bottom:16px">Status atual: ${badge(statusAtual)}</p>
      <div class="field">
        <label>Alterar status para</label>
        <select id="novo-status" class="status-select" style="width:100%;border-radius:8px;padding:10px 14px">
          ${Object.entries(STATUS_LABELS).map(([v,l])=>`<option value="${v}"${v===statusAtual?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarStatus(${id})">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar
      </button>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

async function salvarStatus(id) {
  const novoStatus = document.getElementById('novo-status').value;
  try {
    const r = await fetch(`${API}/admin/pedidos/${id}/status`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({status:novoStatus})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.erro);
    fecharModal();
    toast('Status atualizado!','ok');
    carregar();
  } catch(e){toast(e.message||'Erro ao atualizar.','erro');}
}

function fecharModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharModal();});

function sair(){localStorage.removeItem('artcolor_token');localStorage.removeItem('artcolor_usuario');location.href='../login.html';}

(function init(){
  token = localStorage.getItem('artcolor_token');
  if(!token){location.href='../login.html';return;}
  const u = JSON.parse(localStorage.getItem('artcolor_usuario')||'{}');
  if(u.tipo!=='admin'){location.href='../painel/index.html';return;}
  document.getElementById('user-nome').textContent=u.nome||'Admin';
  document.getElementById('avatar').textContent=(u.nome||'A')[0].toUpperCase();
  carregar();
})();

// Mobile sidebar toggle
(function(){
  const overlay = document.createElement('div');
  overlay.className = 'sidebar-overlay';
  document.body.appendChild(overlay);
  const sidebar = document.querySelector('.sidebar');
  const btnMenu = document.getElementById('btn-menu');
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  if (btnMenu) btnMenu.addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);
})();
</script>
</body>
</html>
